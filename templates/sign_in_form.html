{ % extends "base.html" %}

{% block content %}
  <h2>Sign In</h2>
  <form method="post">
    {{ form.hidden_tag() }}
    
    <div>
        {{ form.username.label }}
        {{ form.username }}
    </div>
    <div>
        {{ form.password.label }}
        {{ form.password }}
    </div>
    {{ form.submit }}
  </form>
{% endblock content %}
